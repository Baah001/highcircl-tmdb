@let movieItem = movie();
<a class="movie-row" [routerLink]="['/movies', movieItem.id]" aria-label="Open movie details">
  <div class="movie-row__poster-wrap">
    <img
      class="movie-row__poster"
      [src]="movieItem.posterThumbnailUrl || 'assets/poster-placeholder.svg'"
      [alt]="movieItem.title + ' poster'"
      loading="lazy"
    />
  </div>

  <div class="movie-row__content">
    <div class="movie-row__title">{{ movieItem.title }}</div>
    <div class="movie-row__subtitle">{{ formatDate(movieItem.releaseDate) }}</div>
  </div>

  <app-rating [rating]="movieItem.rating"/>
</a>
